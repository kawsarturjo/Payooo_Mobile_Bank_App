<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payooo | Add Money</title>

    <!-- tailwindcss and daisyUI cdn link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- fontawesome cdn link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- css-links -->
    <link rel="stylesheet" href="style.css" />

    <!-- favicon -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <style>
      .outfit {
        font-family: "Outfit", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body class="outfit w-[450px] mx-auto">
    <section class="bg-[#FFFFFF]">
      <header
        class="pt-11 pb-8 pl-6 pr-6 flex justify-between items-center border-b border-[#08080850]"
      >
        <!-- left part -->
        <div class="flex gap-2">
          <img class="w-[60px] h-12" src="assets/logo.png" alt="logo" />
          <div>
            <h1 class="font-extrabold text-[18px] text-[#080808]">$45000</h1>
            <p class="text-[14px] text-[#08080850]">Available Balance</p>
          </div>
        </div>

        <!-- right part -->
        <a href="login_form.html"
          ><button
            class="btn text-[14px] text-[#08080850] w-[115px] h-[38px] rounded-lg"
          >
            <img src="assets/Frame.png" alt="logout logo" />Log Out
          </button></a
        >
      </header>

      <!-- welcome parts -->
      <section class="pl-6 pr-6 mt-8">
        <h1 class="text-2xl font-bold leading-[30px] text-[#080808] mb-3.5">
          Welcome to Pay<span class="text-[#7460FF]">oo</span>
        </h1>
        <p class="text-[16px] text-[#08080850] leading-[26px]">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      </section>

      <!-- transcation parts -->
      <section class="p-6 grid grid-cols-3 gap-[16.5px]">
        <button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-[123px] h-[90px] flex-col rounded-xl"
        >
          <img src="assets/opt-1.png" alt="" />Add Money
        </button>

        <button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-[123px] h-[90px] flex-col rounded-xl"
        >
          <img src="assets/opt-2.png" alt="" />Cashout
        </button>

        <button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-[123px] h-[90px] flex-col rounded-xl"
        >
          <img src="assets/opt-3.png" alt="" />Transfer Money
        </button>

        <button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-[123px] h-[90px] flex-col rounded-xl"
        >
          <img src="assets/opt-4.png" alt="" />Get Bonus
        </button>

        <button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-[123px] h-[90px] flex-col rounded-xl"
        >
          <img src="assets/opt-5.png" alt="" />Pay Bill
        </button>

        <button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-[123px] h-[90px] flex-col rounded-xl"
        >
          <img src="assets/opt-6.png" alt="" />Transactions
        </button>
      </section>
    </section>

    <!-- Latest payment part -->
    <section class="bg-[#F4F5F7]">
      <section class="pl-6 pr-6 pt-[29.5px] pb-[53px]">
        <div class="flex justify-between mb-4">
          <h2 class="text-[18px] text-[#08080890] font-semibold">Add Money</h2>
        </div>

        <!-- form -->
        <div
          class="w-[402px] h-[501px] rounded-3xl bg-white shadow-lg flex flex-col justify-center items-center"
        >
          <fieldset class="fieldset p-4">

            <label class="label font-medium text-[#08080870] text-[16px]"
              >Select A Bank</label
            >
            <select class="select rounded-4xl bg-[#F4F5F7] font-light text-[16px] text-[#080808] w-[338px] h-[52px] mb-4">
              <option disabled selected>Select back</option>
              <option>Islamic Bank plc</option>
              <option>Midland Bank ltd</option>
              <option>Brac Bank</option>
            </select>

            <label class="label font-medium text-[#08080870] text-[16px]"
              >Bank Account Number</label
            >
            <input
              id=""
              maxlength="11"
              minlength="11"
              type="text"
              class="input rounded-4xl bg-[#F4F5F7] text-[#080808] font-light text-[16px] w-[338px] h-[52px] mb-4"
              placeholder="Enter 11 digit account number"
            />

            <label class="label font-medium text-[#08080870] text-[16px]"
              >Amount to Add</label
            >
            <input
              id=""
              min="0.00" step="0.01"
              type="number"
              class="input rounded-4xl bg-[#F4F5F7] text-[#080808] font-light text-[16px] w-[338px] h-[52px] mb-4"
              placeholder="Add Amount to withdraw"
            />

            <label class="label font-medium text-[#08080870] text-[16px]"
              >Pin Number</label
            >
            <input
              id=""
              maxlength="4"
              minlength="4"
              type="password"
              class="input rounded-4xl bg-[#F4F5F7] text-[#080808] font-light text-[16px] w-[338px] h-[52px]"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id=""
              class="btn btn-neutral mt-4 w-[338px] h-[53px] bg-[#3B25C1] rounded-4xl border-none"
            >
              Login
            </button>
          </fieldset>
        </div>
      </section>
    </section>

    <script src="Script/add_money.js"></script>
  </body>
</html>
