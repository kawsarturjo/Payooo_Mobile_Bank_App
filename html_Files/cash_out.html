<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payooo | Cash Out</title>

    <!-- tailwindcss and daisyUI cdn link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- fontawesome cdn link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- css-links -->
    <link rel="stylesheet" href="style.css" />

    <!-- favicon -->
    <link rel="shortcut icon" href="../assets/logo.png" type="image/x-icon" />

    <style>
      .outfit {
        font-family: "Outfit", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body class="outfit w-112.5 mx-auto bg-[#F4F5F7]">
    <section class="bg-[#FFFFFF] rounded-b-3xl">
      <header
        class="pt-11 pb-8 pl-6 pr-6 flex justify-between items-center border-b border-[#08080850] sticky top-0 bg-white"
      >
        <!-- left part -->
        <div class="flex gap-2">
          <img class="w-15 h-12" src="../assets/logo.png" alt="logo" />
          <div>
            <h1 class="font-extrabold text-[18px] text-[#080808]">$<span id="balance">45000</span></h1>
            <p class="text-[14px] text-[#08080850]">Available Balance</p>
          </div>
        </div>

        <!-- right part -->
        <a href="../login_form.html"
          ><button
            class="btn text-[14px] text-[#08080850] w-28.75 h-9.5 rounded-lg"
          >
            <img src="../assets/Frame.png" alt="logout logo" />Log Out
          </button></a
        >
      </header>

      <!-- welcome parts -->
      <section class="pl-6 pr-6 mt-8">
        <h1 class="text-2xl font-bold leading-7.5 text-[#080808] mb-3.5">
          Welcome to Pay<span class="text-[#7460FF]">oo</span>
        </h1>
        <p class="text-[16px] text-[#08080850] leading-6.5">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      </section>

      <!-- transcation parts -->
      <section class="p-6 grid grid-cols-3 gap-[16.5px]">
        <a href="add_money.html"><button class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-30.75 h-22.5 flex-col rounded-xl"><img src="../assets/opt-1.png" alt="">Add Money</button></a>

      <a href="cash_out.html"><button class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-30.75 h-22.5 flex-col rounded-xl"><img src="../assets/opt-2.png" alt="">Cashout</button></a>

        <a href="TransferMoney.html"><button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-30.75 h-22.5 flex-col rounded-xl"
        >
          <img src="../assets/opt-3.png" alt="" />Transfer Money
        </button></a>

        <button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-30.75 h-22.5 flex-col rounded-xl"
        >
          <img src="../assets/opt-4.png" alt="" />Get Bonus
        </button>

        <a href="payBill.html"><button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-30.75 h-22.5 flex-col rounded-xl"
        >
          <img src="../assets/opt-5.png" alt="" />Pay Bill
        </button></a>

        <button
          class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl text-[14px] text-[#08080870] w-30.75 h-22.5 flex-col rounded-xl"
        >
          <img src="../assets/opt-6.png" alt="" />Transactions
        </button>
      </section>
    </section>

    <!-- Latest payment part -->
    <section class="bg-[#F4F5F7]">
      <section class="pl-6 pr-6 pt-[29.5px] pb-13.25">
        <div class="flex justify-between mb-4">
          <h2 class="text-[18px] text-[#08080890] font-semibold">Cash Out</h2>
        </div>

        <!-- form -->
        <div
          class="w-100.5 h-100.25 rounded-3xl bg-white shadow-lg flex flex-col justify-center items-center"
        >
          <fieldset class="fieldset p-4">

            <label class="label font-medium text-[#08080870] text-[16px]"
              >Agent Number</label
            >
            <input
              id="cash_out_agent_num"
              maxlength="11"
              minlength="11"
              type="text"
              class="input rounded-4xl bg-[#F4F5F7] text-[#080808] font-light text-[16px] w-84.5 h-13 mb-4"
              placeholder="Enter 11 digit number"
            />

            <label class="label font-medium text-[#08080870] text-[16px]"
              >Amount</label
            >
            <input
              id="cash_out_amount"
              min="0.00" step="0.01"
              type="number"
              class="input rounded-4xl bg-[#F4F5F7] text-[#080808] font-light text-[16px] w-84.5 h-13 mb-4"
              placeholder="Enter amount to withdraw"
            />

            <label class="label font-medium text-[#08080870] text-[16px]"
              >Pin Number</label
            >
            <input
              id="cash_out_pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input rounded-4xl bg-[#F4F5F7] text-[#080808] font-light text-[16px] w-84.5 h-13"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="cash_out_btn"
              class="btn btn-neutral mt-4 w-84.5 h-13.25 bg-[#3B25C1] rounded-4xl border-none"
            >   
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </section>
    </section>


    <script src="../Script/cash_out.js"></script>
  </body>
</html>
